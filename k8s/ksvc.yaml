apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: poc-cesg-poi-search
  namespace: knative-pool
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "0"
        autoscaling.knative.dev/max-scale: "3"
        autoscaling.knative.dev/target: "5"
        autoscaling.knative.dev/scale-down-delay: "60s"
    spec:
      containerConcurrency: 5
      timeoutSeconds: 300
      containers:
        - image: poc-cesg-poi-search:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: HOME
              value: /tmp
            - name: POI_SEARCH_ASSET_URL
              value: "https://z.yuiseki.net/static/cesg/tokyo/poi-search.duckdb"
            - name: POI_SEARCH_MANIFEST_URL
              value: "https://z.yuiseki.net/static/cesg/tokyo/poi-search-manifest.json"
            - name: POI_SEARCH_LOCAL_CACHE
              value: "/tmp/poi-search.duckdb"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
